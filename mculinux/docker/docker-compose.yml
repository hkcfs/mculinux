version: '3.8'

services:
  builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DOCKER_USER: ${USER:-builder}
        DOCKER_USERID: ${UID:-1000}
    image: mculinux-builder
    container_name: mculinux-builder
    volumes:
      - ./build:/app/build
      - ./output:/app/output
    environment:
      - KEEP=${KEEP:-}
    working_dir: /app/build
    stdin_open: true
    tty: true

  build-all:
    extends:
      service: builder
    command: ./build-all.sh all

  build-r8n8:
    extends:
      service: builder
    command: ./build-all.sh r8n8

  build-r8n16:
    extends:
      service: builder
    command: ./build-all.sh r8n16

  build-r16n16:
    extends:
      service: builder
    command: ./build-all.sh r16n16

  qemu-test:
    extends:
      service: builder
    command: ./qemu-test.sh r8n8 30
