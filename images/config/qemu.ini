# QEMU Configuration for MCUlinux

[esp32s3]
# Flash configuration
flash = /dev/null
flash_size = 16M
flash_mode = dio
flash_freq = 80m

# RAM configuration
ram_size = 16M

# Serial configuration
serial = stdio
serial_baud = 115200

# Monitor configuration
monitor = none

# Network configuration
net = user
net_hostfwd = tcp::2222-:22
net_hostfwd = tcp::8080-:80

# Display configuration
display = none

# Debug configuration
gdb = disabled
