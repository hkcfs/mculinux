name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [r8n8]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man gawk libtool-bin \
            git unzip ncurses-dev rsync zlib1g-dev xz-utils cmake wget bzip2 \
            g++ python3 python3-dev python3-pip bc libusb-1.0-0 \
            fakeroot libfakeroot libssl-dev cpio

      - name: Setup build environment
        run: |
          cd mculinux
          make setup

      - name: Build bootloader
        run: |
          cd mculinux
          make bootloader

      - name: Build kernel
        run: |
          cd mculinux
          make kernel-package

      - name: Build flash image
        run: |
          cd mculinux
          make image DEVICE=${{ matrix.device }}

      - name: QEMU boot test
        run: |
          sudo apt-get install -y qemu-system-misc
          cd mculinux
          make test DEVICE=${{ matrix.device }} TIMEOUT=60

      - name: Upload flash image
        uses: actions/upload-artifact@v4
        with:
          name: flash-${{ matrix.device }}
          path: mculinux/output/${{ matrix.device }}/flash_${{ matrix.device }}.bin
          retention-days: 30
