name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')
    strategy:
      matrix:
        device: [r8n8]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build flash image from prebuilts
        run: |
          cd mculinux
          make image DEVICE=${{ matrix.device }}

      - name: Install QEMU and boot test
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc
          cd mculinux
          make test DEVICE=${{ matrix.device }} TIMEOUT=60

      - name: Upload flash image
        uses: actions/upload-artifact@v4
        with:
          name: flash-${{ matrix.device }}
          path: mculinux/output/${{ matrix.device }}/flash_${{ matrix.device }}.bin
          retention-days: 30
