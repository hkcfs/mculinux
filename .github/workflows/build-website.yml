name: Build Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'

jobs:
  build-website:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check website size
        run: |
          echo "Checking website size..."
          TOTAL_SIZE=$(du -sb website/ | cut -f1)
          echo "Total website size: $TOTAL_SIZE bytes"
          
          # Check if under 200KB (204800 bytes)
          if [ "$TOTAL_SIZE" -gt 204800 ]; then
            echo "Error: Website exceeds 200KB limit"
            echo "Current size: $((TOTAL_SIZE / 1024))KB"
            exit 1
          fi
          
          echo "Website size OK: $((TOTAL_SIZE / 1024))KB"

      - name: Validate HTML
        run: |
          # Install html5validator
          pip install html5validator
          
          # Validate HTML files
          find website/ -name "*.html" -exec html5validator --stdout {} \;

      - name: Check for broken links
        run: |
          # Install linkchecker
          pip install linkchecker
          
          # Check links in HTML files
          find website/ -name "*.html" -exec linkchecker --file-output=- {} \; || true

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          destination_dir: .
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy website from ${{ github.sha }}'
