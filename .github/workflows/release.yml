name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip release]') &&
      !contains(github.event.head_commit.message, '[release skip]')
    strategy:
      matrix:
        device: [r8n8, r8n16, r16n16]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man gawk libtool-bin \
            git unzip ncurses-dev rsync zlib1g-dev xz-utils cmake wget bzip2 \
            g++ python3 python3-dev python3-pip bc libusb-1.0-0 \
            fakeroot libfakeroot libssl-dev cpio

      - name: Setup
        run: cd mculinux && make setup

      - name: Build
        run: |
          cd mculinux
          make kernel-package
          make image DEVICE=${{ matrix.device }}

      - name: QEMU test
        run: |
          sudo apt-get install -y qemu-system-misc
          cd mculinux
          make test DEVICE=${{ matrix.device }} TIMEOUT=60

      - name: Package
        run: |
          cd mculinux/output/${{ matrix.device }}
          zip -r flash_${{ matrix.device }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.device }}
          path: mculinux/output/${{ matrix.device }}/flash_${{ matrix.device }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: MCUlinux v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body: |
            ## MCUlinux ${{ steps.version.outputs.version }}

            ESP32-S3 Linux distribution with Alpine-style packaging.

            ### Supported Devices
            - **r8n8**: 8MB PSRAM + 8MB Flash
            - **r8n16**: 8MB PSRAM + 16MB Flash
            - **r16n16**: 16MB PSRAM + 16MB Flash

            ### Files
            - `flash_r8n8.bin` - Complete 8MB flash image
            - `flash_r8n16.bin` - Complete 16MB flash image
            - `flash_r16n16.bin` - Complete 16MB flash image

            ### Flash
            ```bash
            esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash 0x0 flash_r8n8.bin
            ```
          files: |
            image-r8n8/flash_r8n8.zip
            image-r8n16/flash_r8n16.zip
            image-r16n16/flash_r16n16.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
