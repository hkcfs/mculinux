name: Build Packages

on:
  push:
    branches: [main]
    paths:
      - 'mculinux-packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'mculinux-packages/**'

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mculinux-builder:latest mculinux/docker/

      - name: Build packages
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            mculinux-builder:latest \
            bash -c "
              export PATH=/app/autoconf-2.71/root/bin:\$PATH
              cd /app/mculinux-packages
              make all
            "

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: mculinux-packages/packages/*/output/
          retention-days: 30
