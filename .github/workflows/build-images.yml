name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'mculinux-packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'images/**'
      - 'mculinux-packages/**'
  release:
    types: [published]

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [r8n8, r8n16, r16n16]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.idf
          push: false
          tags: mculinux-idf:latest

      - name: Build firmware image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/images:/images \
            -v ${{ github.workspace }}/output:/output \
            mculinux-idf:latest \
            /scripts/build-image.sh ${{ matrix.device }}

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.device }}
          path: output/${{ matrix.device }}/
          retention-days: 30

  test-images:
    needs: build-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [r8n8, r8n16, r16n16]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build QEMU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.qemu
          push: false
          tags: mculinux-qemu:latest

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.device }}
          path: output/${{ matrix.device }}/

      - name: Run QEMU tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            mculinux-qemu:latest \
            /scripts/run-tests.sh ${{ matrix.device }}

  create-release:
    if: github.event_name == 'release'
    needs: test-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [r8n8, r8n16, r16n16]

    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.device }}
          path: output/${{ matrix.device }}/

      - name: Create release package
        run: |
          cd output/${{ matrix.device }}
          zip -r ${{ matrix.device }}.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: output/${{ matrix.device }}/${{ matrix.device }}.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
